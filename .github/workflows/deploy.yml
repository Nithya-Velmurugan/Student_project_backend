name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu

            # Clone repo if not exists
            if [ ! -d "app" ]; then
              git clone https://github.com/Nithya-Velmurugan/Student_project_backend.git app
            fi

            cd app
            git pull

            # Create .env file from GitHub secret
            echo "${{ secrets.ENV_FILE }}" > .env

            # Fix docker permission (safe way)
            sudo usermod -aG docker ubuntu || true

            # Build image
            sudo docker build -t student-app .

            # Stop old container
            sudo docker stop student-app || true
            sudo docker rm student-app || true

            # Run new container
            sudo docker run -d -p 8082:8082 \
              --env-file .env \
              --name student-app student-app