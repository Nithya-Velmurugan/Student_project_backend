name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu

            # Clone repo if not exists
            if [ ! -d "app" ]; then
              git clone https://github.com/Nithya-Velmurugan/Student_project_backend.git app
            fi

            cd app
            git pull origin main

            # Create .env file from GitHub secret
            echo "${{ secrets.ENV_FILE }}" > .env

            # Fix docker permission (optional)
            sudo usermod -aG docker ubuntu || true

            # Kill ANY process using port 8082
            sudo fuser -k 8082/tcp || true

            # Stop container using port 8082 (important fix)
            sudo docker ps -q --filter "publish=8082" | xargs -r sudo docker stop
            sudo docker ps -a -q --filter "publish=8082" | xargs -r sudo docker rm

            # Remove old container (safety)
            sudo docker stop student-app || true
            sudo docker rm student-app || true

            # Build image
            sudo docker build -t student-app .

            # Run new container
            sudo docker run -d -p 8082:8082 \
              --env-file .env \
              --name student-app student-app

            echo "✅ Deployment successful"