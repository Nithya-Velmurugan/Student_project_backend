version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: services/Dockerfile
    container_name: stu_backend_app
    ports:
      - "8080:8082"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=yourpassword
      - DB_NAME=postgres
      - DB_PORT=5432
    depends_on:
      - db
      
  db:
    image: postgres:15-alpine
    container_name: stu_backend_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
