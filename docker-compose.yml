version: "3.9"

services:
  app:
    build: .
    container_name: go_app
    ports:
      - "8022:8082"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: 4207
      DB_NAME: postgres
      DB_PORT: 5432
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4207
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: